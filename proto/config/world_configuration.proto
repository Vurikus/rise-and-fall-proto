syntax = "proto3";

package proto.config;

option java_multiple_files = true;
option java_outer_classname = "WorldConfigurationProtoOuter";

import "proto/config/world_size.proto";
import "proto/config/map_type.proto";

message WorldConfigurationProto {
  proto.config.WorldSizeProto world_size = 1;
  proto.config.MapTypeProto map_type = 2;
}