syntax = "proto3";

package proto.world;

option java_multiple_files = true;
option java_package = "proto.world";
option java_outer_classname = "SphereTileKey";

import "proto/common/api_vector3.proto";

message SphereTileKey {
  string id = 1;
  uint32 index = 2;
  proto.common.ApiVector3 center = 3;
  repeated string neighbor_ids = 4;
}